spring:
  application:
    name: Upply
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  main:
    allow-bean-definition-overriding: true
  threads:
    virtual:
      enabled: true
  ai:
    model:
      embedding: transformers
    embedding:
      transformer:
        cache:
          enabled: true
          directory: /tmp/spring-ai-onnx-model
        tokenizer:
          uri: https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/tokenizer.json
        onnx:
          model-uri: https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/onnx/model.onnx
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL}
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}

  cache:
    type: redis

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
  cloud:
    azure:
      monitor:
        instrumentation:
          connection-string: ${OBSERVE}
  kafka:
    bootstrap-servers: ${KAFKA_URL}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL}
      ssl.truststore.location: ${KAFKA_TRUSTSTORE_PATH}
      ssl.truststore.password: ${KAFKA_SSL_PASSWORD}
      ssl.truststore.type: JKS
      ssl.keystore.location: ${KAFKA_KEYSTORE_PATH}
      ssl.keystore.password: ${KAFKA_SSL_PASSWORD}
      ssl.keystore.type: PKCS12
      ssl.key.password: ${KAFKA_SSL_PASSWORD}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: application-matching-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.upply.*"

server:
  port: 8080
  servlet:
    context-path: /api/v1

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.ai: DEBUG
    com.upply.job.JobMatchingService: DEBUG

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration: ${JWT_EXPIRATION}

app:
  activation-base-url: ${ACTIVATION_BASE_URL}
  export:
    task-expire-seconds: ${TASK_EXPIRE_SECONDS}
    cleanup-interval-ms: ${SCULDER_CLEANUP_TIME}

azure:
  storage:
    connection-String: ${AZURE_STORAGE_CONNECTION_STRING}
    container-name: ${AZURE_STORAGE_CONTAINER_NAME}
  search:
    endpoint: ${AZURE_SEARCH_ENDPOINT}
    key: ${AZURE_SEARCH_KEY}

applicationinsights:
  connection:
    string: ${OBSERVE}

firebase:
  service:
    account: ${FIREBASE_PRIVATE_KEY}


management:
  tracing:
    enabled: true
  otlp:
    tracing:
      enabled: true
      endpoint: https://ingestion.azuremonitor.io/v1/traces