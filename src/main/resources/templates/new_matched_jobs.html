<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Job Match</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background-color:#f8f9fa; margin:0; padding:40px;">

<table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin:auto; background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08);">
    <tr>
        <td style="padding: 40px 30px;">
            <div style="text-align:center; margin-bottom:30px;">
                <div style="display:inline-block; background:#e3f2fd; border-radius:50%; width:56px; height:56px; line-height:56px; text-align:center;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
            </div>

            <h1 style="color:#1a1a2e; font-size:22px; font-weight:600; margin:0 0 8px 0; text-align:center;">
                A New Job Matches Your Skills
            </h1>

            <p style="color:#4a5568; font-size:15px; margin:0 0 30px 0; text-align:center;">
                Hi <span th:text="${firstName}" style="font-weight:600;">User</span>,
            </p>

            <div style="background:#f8f9fa; border-radius:10px; padding:24px; margin-bottom:30px;">
                <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                        <td style="padding-bottom:12px;">
                            <span style="color:#718096; font-size:12px; text-transform:uppercase; letter-spacing:0.5px;">Position</span>
                            <p style="margin:4px 0 0 0; color:#1a1a2e; font-size:17px; font-weight:500;" th:text="${jobTitle}">
                                Software Engineer
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding-top:12px;">
                            <span style="color:#718096; font-size:12px; text-transform:uppercase; letter-spacing:0.5px;">Company</span>
                            <p style="margin:4px 0 0 0; color:#1a1a2e; font-size:17px; font-weight:500;" th:text="${jobCompany}">
                                Acme Corp
                            </p>
                        </td>
                    </tr>
                </table>
            </div>

            <div style="text-align:center;">
                <a th:href="${jobUrl}"
                   style="display:inline-block; background:#1976d2; color:white;
                              padding:14px 32px; border-radius:8px; text-decoration:none;
                              font-size:15px; font-weight:500;">
                    View Job Details
                </a>
            </div>

            <p style="margin-top:24px; color:#a0aec0; font-size:13px; text-align:center;">
                If the button doesn't work, copy and paste this link into your browser:
            </p>
            <p style="color:#1976d2; font-size:13px; text-align:center; word-break:break-all;" th:text="${jobUrl}">
                https://www.upply.tech/jobs?id=123
            </p>

            <div style="margin-top:40px; padding-top:24px; border-top:1px solid #e2e8f0; text-align:center;">
                <p style="color:#a0aec0; font-size:12px; margin:0;">
                    You're receiving this because your skills match jobs posted on Upply.
                </p>
            </div>
        </td>
    </tr>
</table>

</body>
</html>
